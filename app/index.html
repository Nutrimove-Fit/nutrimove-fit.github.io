<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nutrimove Fit – Trainings- &amp; Ernährungsapp">

  <!-- Viewport: Vollbild auf iPhone, kein Zoom, deckt Notch/Safe Area ab -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- iOS PWA: Vollbild-Modus (Home Screen App) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nutrimove Fit">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=20260105">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-192.png?v=20260105">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png?v=20260105">

  <!-- Theme Color für iOS Safari Statusbar -->
  <meta name="theme-color" content="#000000">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=20260105"/>

  <title>Nutrimove Fit</title>
  <link rel="manifest" href="manifest.json?v=20260105">

  <style>
    /* Vollbild & kein weisser Rand auf iOS */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
      background-color: #111111;
    }
    /* Flutter canvas füllt die Notch-freie Fläche aus */
    flt-glass-pane, flutter-view {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
